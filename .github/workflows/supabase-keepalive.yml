# Ping periódico con consulta REAL a Postgres (PostgREST RPC). /auth/v1/health no basta
# para la pausa por inactividad del plan gratuito.
#
# 1) Ejecuta en Supabase SQL Editor: supabase-keepalive-rpc.sql
# 2) Secrets → Actions: SUPABASE_URL, SUPABASE_ANON_KEY (sin comillas al pegar)
#
# No uses la service_role aquí.

name: Supabase keep-alive

on:
  schedule:
    # Cada día 10:00 UTC (margen frente al umbral típico ~7 días sin actividad en BD)
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Postgres (rpc keepalive_ping)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          url="${SUPABASE_URL:-}"
          key="${SUPABASE_ANON_KEY:-}"
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::error::Faltan secrets SUPABASE_URL o SUPABASE_ANON_KEY en el repositorio."
            exit 1
          fi
          # curl exit 3 = URL mal formada (típico: comillas o saltos al pegar el secret)
          url=$(printf '%s' "$url" | head -n1 | tr -d '\r')
          key=$(printf '%s' "$key" | head -n1 | tr -d '\r')
          url="${url#"${url%%[![:space:]]*}"}"
          url="${url%"${url##*[![:space:]]}"}"
          key="${key#"${key%%[![:space:]]*}"}"
          key="${key%"${key##*[![:space:]]}"}"
          url="${url#\'}"
          url="${url%\'}"
          url="${url#\"}"
          url="${url%\"}"
          key="${key#\'}"
          key="${key%\'}"
          key="${key#\"}"
          key="${key%\"}"
          BASE="${url%/}"
          if [ -z "$BASE" ] || [ "${BASE#https://}" = "$BASE" ]; then
            echo "::error::SUPABASE_URL inválida tras limpiar espacios/comillas. Debe ser https://....supabase.co (sin comillas en el secret de GitHub)."
            exit 1
          fi
          body_file="$(mktemp)"
          trap 'rm -f "$body_file"' EXIT
          code=$(curl -sS -o "$body_file" -w "%{http_code}" -X POST \
            -H "apikey: ${key}" \
            -H "Authorization: Bearer ${key}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=representation" \
            -d '{}' \
            "${BASE}/rest/v1/rpc/keepalive_ping") || {
              echo "::error::curl falló (red, DNS, TLS, timeout). Revisa SUPABASE_URL."
              exit 1
            }
          echo "HTTP status: ${code}"
          echo "Response body:"
          cat "$body_file"
          echo
          if [ "${code}" != "200" ]; then
            echo "::error::keepalive_ping no respondió 200. ¿Ejecutaste supabase-keepalive-rpc.sql en el SQL Editor?"
            exit 1
          fi
          echo "::notice::keepalive_ping OK (Postgres vía PostgREST)"
