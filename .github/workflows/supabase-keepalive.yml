# Ping periódico al API de Supabase para reducir riesgo de pausa por inactividad (plan gratuito).
# Requiere secrets en el repo: Settings → Secrets and variables → Actions
#   SUPABASE_URL       → https://tu-proyecto.supabase.co (sin barra final)
#   SUPABASE_ANON_KEY  → anon public key (misma que VITE_SUPABASE_ANON_KEY)
# En GitHub pega el valor SIN comillas simples/dobles (si copias desde .env, quítalas).
#
# No uses la service_role aquí.

name: Supabase keep-alive

on:
  schedule:
    # Lunes y jueves 10:00 UTC (~2 veces/semana)
    - cron: '0 10 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Auth health
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          url="${SUPABASE_URL:-}"
          key="${SUPABASE_ANON_KEY:-}"
          if [ -z "$url" ] || [ -z "$key" ]; then
            echo "::error::Faltan secrets SUPABASE_URL o SUPABASE_ANON_KEY en el repositorio."
            exit 1
          fi
          # curl exit 3 = URL mal formada (típico: comillas o saltos al pegar el secret)
          url=$(printf '%s' "$url" | head -n1 | tr -d '\r')
          key=$(printf '%s' "$key" | head -n1 | tr -d '\r')
          url="${url#"${url%%[![:space:]]*}"}"
          url="${url%"${url##*[![:space:]]}"}"
          key="${key#"${key%%[![:space:]]*}"}"
          key="${key%"${key##*[![:space:]]}"}"
          url="${url#\'}"
          url="${url%\'}"
          url="${url#\"}"
          url="${url%\"}"
          key="${key#\'}"
          key="${key%\'}"
          key="${key#\"}"
          key="${key%\"}"
          BASE="${url%/}"
          if [ -z "$BASE" ] || [ "${BASE#https://}" = "$BASE" ]; then
            echo "::error::SUPABASE_URL inválida tras limpiar espacios/comillas. Debe ser https://....supabase.co (sin comillas en el secret de GitHub)."
            exit 1
          fi
          curl -sfS \
            -H "apikey: ${key}" \
            -H "Authorization: Bearer ${key}" \
            "${BASE}/auth/v1/health" \
            -o /dev/null
